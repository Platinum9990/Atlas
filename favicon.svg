<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background -->
  <rect width="32" height="32" fill="#080F1E"/>
  <!-- Blue border -->
  <rect x="1.5" y="1.5" width="29" height="29" fill="none" stroke="#0EA5E9" stroke-width="1"/>
  <!-- A letterform - geometric, condensed -->
  <line x1="16" y1="5" x2="6" y2="26" stroke="#0EA5E9" stroke-width="2" stroke-linecap="square"/>
  <line x1="16" y1="5" x2="26" y2="26" stroke="#0EA5E9" stroke-width="2" stroke-linecap="square"/>
  <!-- Crossbar -->
  <line x1="10.5" y1="18" x2="21.5" y2="18" stroke="#0EA5E9" stroke-width="1.5"/>
  <!-- Amber baseline dot -->
  <rect x="14.5" y="27" width="3" height="1.5" fill="#F59E0B"/>
</svg>
